<!DOCTYPE html>
<html>
<head>
    <title>Regenerate Telegram Session</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .panel { max-width: 500px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .info { background: #e7f3ff; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Regenerate Telegram Session</h2>
        
        {% if step == 1 %}
            <div class="info">Enter your Telegram phone number to receive a verification code.</div>
            <form method="post" action="/session-regenerate/send-code">
                <input type="hidden" name="csrf" value="{{ csrf }}">
                <label for="phone">Phone Number (with country code)</label>
                <input id="phone" name="phone_number" type="tel" placeholder="+1234567890" required autofocus>
                <button type="submit">Send Code</button>
            </form>
        
        {% elif step == 2 %}
            <div class="info">✅ Code sent to {{ phone }}</div>
            <form method="post" action="/session-regenerate/verify-code">
                <input type="hidden" name="csrf" value="{{ csrf }}">
                <label for="code">Verification Code</label>
                <input id="code" name="code" type="text" placeholder="12345" required autofocus>
                <label for="password">2FA Password (if enabled)</label>
                <input id="password" name="password" type="password" placeholder="Leave blank if no 2FA">
                <button type="submit">Verify & Update Session</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
