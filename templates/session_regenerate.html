<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Session Regenerate</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/"><span class="brand-mark">A</span><span>Archive Scanner</span></a>
</header>
<main class="container">
  <section class="panel">
    <div class="panel-head"><div><p class="eyebrow">Account</p><h2>Regenerate Session</h2></div>
    <span class="icon-box">🔐</span></div>
    <p class="muted">Update Telegram account. Phone + 2FA (if enabled) required.</p>
    {% if step == 1 %}
    <form method="post" action="/session-regenerate/send-code" class="stack">
      <input type="hidden" name="csrf" value="{{ csrf }}">
      <label>Phone Number</label>
      <input name="phone_number" type="tel" placeholder="+1234567890" required>
      <p class="muted">Include country code</p>
      <button type="submit">Send Code</button>
    </form>
    {% elif step == 2 %}
    <form method="post" action="/session-regenerate/verify-code" class="stack">
      <input type="hidden" name="csrf" value="{{ csrf }}">
      <p class="muted">Code sent to <strong>{{ phone }}</strong></p>
      <label>Code</label>
      <input name="code" type="text" placeholder="12345" required>
      <label>2FA (optional)</label>
      <input name="password" type="password" placeholder="Leave blank if none">
      <button type="submit">Verify & Update</button>
    </form>
    {% endif %}
  </section>
</main>
</body>
</html>
